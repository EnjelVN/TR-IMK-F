<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Tour Guide - Artemis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container py-5">
    <button class="btn btn-outline-secondary mb-4"><i class="bi bi-arrow-left"></i></button>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card p-4 shadow-sm mb-4">
                <div class="d-flex align-items-center gap-4">
                    <div class="position-relative">
                        <img src="foto-guide.jpg" class="rounded-circle" width="120" height="120" alt="Guide">
                        <i class="bi bi-patch-check-fill text-primary position-absolute bottom-0 end-0 bg-white rounded-circle fs-3"></i>
                    </div>
                    <div>
                        <div class="text-primary mb-1">
                            <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i> 
                            <small class="text-muted">(120+ Positive Reviews)</small>
                        </div>
                        <div class="d-flex gap-3">
                            <div class="stat-box"><h6>10+</h6><small>YEARS EXP.</small></div>
                            <div class="stat-box"><h6>5</h6><small>LANGUAGES</small></div>
                            <div class="stat-box"><h6>700+</h6><small>TOURS</small></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card p-4 shadow-sm">
                <h5 class="fw-bold mb-4">Expertise Highlights</h5>
                <label class="mb-1">Trustworthy <span class="float-end text-primary fw-bold">75%</span></label>
                <div class="progress mb-3"><div class="progress-bar" style="width: 75%"></div></div>
                <label class="mb-1">Experience <span class="float-end text-primary fw-bold">97%</span></label>
                <div class="progress mb-3"><div class="progress-bar" style="width: 97%"></div></div>
                <label class="mb-1">Safety <span class="float-end text-primary fw-bold">100%</span></label>
                <div class="progress"><div class="progress-bar" style="width: 100%"></div></div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card p-4 shadow-sm h-100">
                <h2 class="fw-bold">Nama Guide</h2>
                <h6 class="text-primary mb-4">Specialist Title</h6>
                <p class="text-muted small"><strong>ABOUT</strong><br>Deskripsi singkat tentang keahlian dan pengalaman guide di sini...</p>
                <hr>
                <div class="d-flex align-items-center gap-3 my-3">
                    <i class="bi bi-geo-alt-fill text-primary"></i> <div><small class="d-block text-muted">NATIONALITY</small>Location</div>
                </div>
                <div class="d-flex align-items-center gap-3 my-3">
                    <i class="bi bi-telephone-fill text-primary"></i> <div><small class="d-block text-muted">PHONE</small>+xx xxxx xxxx</div>
                </div>
                <button class="btn btn-primary w-100 mt-4">Schedule a Consultation</button>
            </div>
        </div>
    </div>
</main>

</body>
</html>
